name: Apply Phase 1 regression fixes

on:
  push:
    branches:
      - fix/phase1-regression-bugs
    paths:
      - .github/workflows/apply-phase1-regression-fixes.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/phase1-regression-bugs
          fetch-depth: 0

      - name: Apply validated fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          common_path = Path("app/backend/app/api/routes/lab_common_parameters.py")
          common_text = common_path.read_text(encoding="utf-8")
          old_alias = '        "aliases": ["MAGNEZYUM", "MAGNESIUM", "MG"],'
          new_alias = '        "aliases": ["MAGNEZYUM", "MAGNESIUM"],'
          if common_text.count(old_alias) != 1:
              raise RuntimeError("Expected magnesium alias definition was not found exactly once.")
          common_path.write_text(
              common_text.replace(old_alias, new_alias, 1),
              encoding="utf-8",
              newline="\n",
          )

          resolver_path = Path("app/backend/app/domain/reference_resolver.py")
          resolver_text = resolver_path.read_text(encoding="utf-8")

          old_call = "            return self._from_extracted(request)"
          new_call = "            return await self._from_extracted(request)"
          if resolver_text.count(old_call) != 1:
              raise RuntimeError("Expected _from_extracted call was not found exactly once.")
          resolver_text = resolver_text.replace(old_call, new_call, 1)

          replacement = '''    # -- Priority 1 ------------------------------------------------------
              async def _from_extracted(
                  self, request: ReferenceResolutionRequest
              ) -> ReferenceResolutionResult:
                  has_min = request.extracted_reference_min is not None
                  has_max = request.extracted_reference_max is not None
                  has_unit = bool(
                      request.extracted_unit
                      and request.extracted_unit.strip()
                  )

                  parameter = await self._parameters.get_by_id(
                      request.canonical_parameter_id
                  )

                  default_unit = (
                      (parameter.default_unit or "").strip()
                      if parameter is not None
                      else ""
                  )

                  # Empty default unit means the parameter is dimensionless.
                  # Example: BUN / Creatinine ratio.
                  is_dimensionless = (
                      parameter is not None
                      and not default_unit
                  )

                  complete = (
                      has_min
                      and has_max
                      and (has_unit or is_dimensionless)
                  )

                  reason = "Using the reference range extracted from the report."

                  if is_dimensionless and not has_unit:
                      reason += (
                          " Parameter is dimensionless; "
                          "no physical unit is required."
                      )
                  elif not complete:
                      reason += (
                          " Extracted range is incomplete "
                          "(missing a bound or unit)."
                      )

                  resolved_unit = (
                      request.extracted_unit
                      if has_unit
                      else default_unit or None
                  )

                  return ReferenceResolutionResult(
                      canonical_parameter_id=request.canonical_parameter_id,
                      reference_min=request.extracted_reference_min,
                      reference_max=request.extracted_reference_max,
                      unit=resolved_unit,
                      reference_source=_EXTRACTED_SOURCE,
                      confidence=(
                          CONF_EXTRACTED_FULL
                          if complete
                          else CONF_EXTRACTED_PARTIAL
                      ),
                      reason=reason,
                      needs_review=not complete,
                      resolved_from=ReferenceStrategy.EXTRACTED,
                  )


          '''
          replacement = re.sub(r"^ {14}", "", replacement, flags=re.MULTILINE)

          pattern = re.compile(
              r"^    # -- Priority 1 -+\r?\n"
              r".*?"
              r"(?=^    # -- Priority 2 -+\r?\n)",
              flags=re.MULTILINE | re.DOTALL,
          )
          resolver_text, count = pattern.subn(replacement, resolver_text, count=1)
          if count != 1:
              raise RuntimeError("Priority 1 block could not be replaced safely.")

          compile(resolver_text, str(resolver_path), "exec")
          resolver_path.write_text(resolver_text, encoding="utf-8", newline="\n")
          PY

          python -m py_compile \
            app/backend/app/api/routes/lab_common_parameters.py \
            app/backend/app/domain/reference_resolver.py

      - name: Remove one-time workflow and commit fixes
        shell: bash
        run: |
          rm -f .github/workflows/apply-phase1-regression-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/backend/app/api/routes/lab_common_parameters.py
          git add app/backend/app/domain/reference_resolver.py
          git add .github/workflows/apply-phase1-regression-fixes.yml
          git commit -m "fix: harden Phase 1 lab parsing and dimensionless ratios [skip ci]"
          git push origin HEAD:fix/phase1-regression-bugs
